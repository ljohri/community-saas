# Upload crawled site files from treasurer-sfbc/sfbc_site into the R2 bucket
# bound as CONTENT_BUCKET (see wrangler.toml). Run manually after crawl pushes,
# or trigger from the private repo via repository_dispatch.

name: Import snapshot to R2

on:
  workflow_dispatch:
    inputs:
      site_ref:
        description: "Git ref on treasurer-sfbc/sfbc_site (branch, tag, or SHA)"
        required: false
        default: "main"
  repository_dispatch:
    types: [sfbc_site_push]

concurrency:
  group: import-snapshot-r2
  cancel-in-progress: false

jobs:
  import:
    environment: Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Resolve snapshot ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            R="${{ github.event.client_payload.ref }}"
          else
            R="${{ inputs.site_ref }}"
          fi
          if [ -z "$R" ]; then R="main"; fi
          echo "ref=$R" >> "$GITHUB_OUTPUT"

      - name: Checkout sfbc_site
        uses: actions/checkout@v4
        with:
          repository: treasurer-sfbc/sfbc_site
          ref: ${{ steps.ref.outputs.ref }}
          path: sfbc_site
          token: ${{ secrets.SFBC_SITE_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-importer.txt

      - name: Install importer deps
        run: pip install -r scripts/requirements-importer.txt

      - name: Import to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: sfbc
        run: python scripts/import_snapshot_r2.py --site-root sfbc_site --manifest-out import-manifest.json

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: import-manifest
          path: import-manifest.json
